workflows:

  # ── Android — Google Play ──────────────────────────────────────────────────
  android-release:
    name: Android Release (AAB + APK)
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - android_creds
      vars:
        CONFIG_FILE: configs/smr26.json

    scripts:
      - name: Set up keystore
        script: |
          echo $FCI_KEYSTORE | base64 --decode > android/upload-keystore.jks
          cat >> android/key.properties << EOF
          storePassword=$FCI_KEYSTORE_PASSWORD
          keyPassword=$FCI_KEY_PASSWORD
          keyAlias=$FCI_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build AAB
        script: flutter build appbundle --release --dart-define-from-file=$CONFIG_FILE

      - name: Build APK
        script: flutter build apk --release --dart-define-from-file=$CONFIG_FILE

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal  # internal → alpha → beta → production
        submit_as_draft: true

  # ── iOS — App Store ────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release (IPA)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_creds
      vars:
        CONFIG_FILE: configs/smr26.json
        BUNDLE_ID: com.htagsante.smr2026
        APP_STORE_APPLE_ID: 000000000  # Remplacer par votre Apple ID App Store Connect

    scripts:
      - name: Set up keychain & certificates
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define-from-file=$CONFIG_FILE \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false  # Passer à true quand prêt
