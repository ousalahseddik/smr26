workflows:

  # ── iOS — App Store ────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release (IPA)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_creds
      vars:
        CONFIG_FILE: configs/smr26.json
        BUNDLE_ID: com.hashtagsante.smr2026
        APP_STORE_APPLE_ID: 6763072246

    scripts:
      - name: Set up keychain & certificates
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define-from-file=$CONFIG_FILE \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    # publishing:
    #   app_store_connect:
    #     api_key: $APP_STORE_CONNECT_PRIVATE_KEY
    #     key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
    #     issuer_id: $APP_STORE_CONNECT_ISSUER_ID
    #     submit_to_testflight: true
    #     submit_to_app_store: true

  # ── iOS — Simulator (Appetize) ─────────────────────────────────────────────
  ios-simulator:
    name: iOS Simulator Build (Appetize)
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        CONFIG_FILE: configs/smr26.json

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build iOS Simulator
        script: |
          flutter build ios --simulator \
            --dart-define-from-file=$CONFIG_FILE
          BINARY="build/ios/iphonesimulator/Runner.app/Runner"
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphonesimulator \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="x86_64" \
            VALID_ARCHS="x86_64" \
            BUILD_DIR=build/ios_x86 \
            -quiet
          X86_BINARY=$(find build/ios_x86 -name Runner -not -path "*.dSYM/*" | head -1)
          if [ -n "$X86_BINARY" ]; then
            lipo -create "$BINARY" "$X86_BINARY" -output "$BINARY"
            echo "Fat binary created: $(lipo -info $BINARY)"
          fi

      - name: Zip Runner.app
        script: |
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip
